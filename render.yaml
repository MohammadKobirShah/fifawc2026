# Render Blueprint — Saoodify Player (KaiOS)
# Docs: https://render.com/docs/blueprint-spec
#
# This app is a static single-file build (dist/index.html). A Render
# "Static Site" is the correct, free service type — it needs NO Start Command.
#
# Deploy: push this repo to GitHub/GitLab → Render dashboard → New → Blueprint
#         (or: `render blueprint deploy` with the Render CLI)
services:
  - type: web
    name: saoodify-player
    env: static # <-- STATIC SITE: serves ./dist, no process to keep alive
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    # Single-page app: every unknown route falls back to index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
