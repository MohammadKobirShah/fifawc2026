server {
    listen 80;
    listen [::]:80; # এই লাইনটি IPv6 লুপব্যাক [::1] এর মাধ্যমে টানেলের কানেকশন নিশ্চিত করবে!
    server_name localhost;

    location / {
        proxy_pass https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/enc/ajfoeddkbz/out/v1/b78800b9b2304879b15843f455836829/;
        
        # SNI Handshake ও CDN বাইপাস করার জন্য প্রয়োজনীয় হেডার্স
        proxy_set_header Host otte.cache.aiv-cdn.net;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_set_header User-Agent $http_user_agent;
        
        # প্লেয়ারের জন্য CORS পলিসি ফুল ওপেন রাখা
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        add_header 'Access-Control-Expose-Headers' '*' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
            add_header 'Access-Control-Allow-Headers' '*';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            return 204;
        }

        # বাফারিং অফ রাখা যাতে লাইভ ফিড ইনস্ট্যান্ট ও বাফারিং ছাড়া লোড হয়
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
